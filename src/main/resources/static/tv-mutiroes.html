<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Painel de Mutirões - Agencia</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f7a5f">
  <link rel="apple-touch-icon" href="/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --header-height: 7vh;
      --footer-height: 90px;
      --progress-height: 4px;
      --brand: #1f4f8a;
      --bg: #edf2f8;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: #263645;
    }

    header {
      background: #fff;
      padding: 0 20px;
      height: var(--header-height);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 4px solid var(--brand);
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    .logo-area img {
      height: 5.5vh;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: 2em;
      text-transform: uppercase;
      text-align: center;
      color: #1b3048;
      letter-spacing: 1px;
    }

    .container {
      padding: 10px;
      height: calc(100vh - var(--header-height) - var(--footer-height) - var(--progress-height));
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 10px;
    }

    .card-vaga {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #d7dee6;
      border-left: 8px solid var(--brand);
      padding: 12px;
      display: flex;
      flex-direction: column;
      min-width: 0;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .codigo-badge {
      color: #111;
      padding: 0;
      font-size: 0.95rem;
      font-weight: 900;
      text-transform: none;
      background: transparent;
      border: none;
      line-height: 1.15;
    }

    .local-texto {
      font-size: 0.68rem;
      color: #52657c;
      text-transform: uppercase;
      text-align: right;
    }

    .card-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
      flex: 1;
      justify-content: center;
    }

    .info-texto {
      font-size: 0.72rem;
      color: #24384e;
      line-height: 1.18;
      white-space: pre-wrap;
      overflow: hidden;
    }

    .rodape {
      height: var(--footer-height);
      background: #6889ec;
      border-top: 1px solid #d6dee8;
      position: fixed;
      left: 0;
      right: 0;
      bottom: var(--progress-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 14px;
      box-sizing: border-box;
    }

    .rodape-centro {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .rodape-texto {
      text-align: center;
    }

    .rodape-titulo {
      margin: 0;
      font-size: 1.12em;
      color: #000;
      font-weight: 900;
      text-transform: uppercase;
    }

    .rodape-sub {
      margin-top: 4px;
      font-size: 0.9em;
      color: #000;
      font-weight: 600;
    }

    .rodape-qr {
      width: 78px;
      height: 78px;
      background: #f5f7fa;
      border: 1px solid #d4dce7;
      border-radius: 8px;
      object-fit: contain;
    }

    .rodape-aviso {
      font-size: 1em;
      font-weight: 900;
      color: #fff;
      background: #d32f2f;
      padding: 10px 14px;
      border-radius: 6px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.1;
    }

    .barra-tempo {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--progress-height);
      background: var(--brand);
      width: 0;
      z-index: 20;
    }

    .nav-buttons {
      position: fixed;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .nav-buttons.show { opacity: 1; }

    .nav-btn {
      pointer-events: auto;
      border: none;
      background: rgba(0,0,0,0.55);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      font-size: 28px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .empty {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #6b7b8a;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
<header>
  <div class="logo-area">
    <img src="/logo.png" alt="Logo" onerror="this.style.display='none'">
  </div>
  <h1 id="titulo-painel">PAINEL DE MUTIRÕES - TELA 1</h1>
  <div></div>
</header>

<div class="container" id="lista-vagas"></div>

<footer class="rodape">
  <div class="rodape-aviso">ATENÇÃO!<br>NÃO tocar na tela da TV</div>
  <div class="rodape-centro">
    <div class="rodape-texto">
      <p class="rodape-titulo">ACESSE JÁ O MURAL DE MUTIRÕES INTERATIVO</p>
      <div class="rodape-sub">Escaneie o QR Code pelo seu celular e veja os detalhes</div>
    </div>
    <img class="rodape-qr" id="qr-mural" alt="QR code do mural de mutirões">
  </div>
  <div class="rodape-aviso">ATENÇÃO!<br>NÃO tocar na tela da TV</div>
</footer>
<div class="barra-tempo" id="barra-progresso"></div>
<div class="nav-buttons" id="nav-buttons">
  <button class="nav-btn" id="btn-prev" aria-label="Anterior">&lsaquo;</button>
  <button class="nav-btn" id="btn-next" aria-label="Proximo">&rsaquo;</button>
</div>

<script>
  const TEMPO_POR_TELA = 30000;
  const TEMPO_ATUALIZAR_QR = 60000;
  const TEMPO_ATUALIZAR_DADOS = 60000;
  const MODULO = "MUTIROES";
  let telaAtual = "1";
  let vagasCache = [];
  let possuiTela2 = false;
  let titulosMutirao = {
    "1": "PAINEL DE MUTIRÕES - TELA 1",
    "2": "PAINEL DE MUTIRÕES - TELA 2"
  };

  async function carregarTitulos() {
    try {
      const res = await fetch('/api/infos');
      const infos = await res.json();
      titulosMutirao = {
        "1": infos.mutiraoTituloTela1 || "PAINEL DE MUTIRÕES - TELA 1",
        "2": infos.mutiraoTituloTela2 || "PAINEL DE MUTIRÕES - TELA 2"
      };
    } catch (_) {}
  }

  async function carregarVagas() {
    const res = await fetch(`/api/vagas/modulo?tipo=${MODULO}`);
    vagasCache = await res.json();
    possuiTela2 = Array.isArray(vagasCache) && vagasCache.some(vaga => (vaga.tela || '1') === '2');
    if (!possuiTela2) {
      telaAtual = "1";
    }
    atualizarVisibilidadeNavegacao();
  }

  function renderizarTela() {
    const container = document.getElementById('lista-vagas');
    document.getElementById('titulo-painel').textContent = titulosMutirao[telaAtual] || `PAINEL DE MUTIRÕES - TELA ${telaAtual}`;
    container.innerHTML = '';

    const vagasDaTela = (Array.isArray(vagasCache) ? vagasCache : []).filter(vaga => (vaga.tela || '1') === telaAtual);

    if (!vagasDaTela.length) {
      container.innerHTML = `<div class="empty">Nenhum mutirão disponível na Tela ${telaAtual}.</div>`;
      return;
    }

    vagasDaTela.slice(0, 30).forEach(vaga => {
      const card = document.createElement('div');
      card.className = 'card-vaga';
      card.innerHTML = `
        <div class="card-top">
          <span class="codigo-badge">${vaga.empresa || '-'}</span>
          <span class="local-texto">${vaga.local ? `📍${vaga.local}` : ''}</span>
        </div>
        <div class="card-content">
          <div class="info-texto">${vaga.atribuicoes || '-'}</div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function animarBarra() {
    const barra = document.getElementById('barra-progresso');
    barra.style.transition = 'none';
    barra.style.width = '0%';
    setTimeout(() => {
      barra.style.transition = `width ${TEMPO_POR_TELA}ms linear`;
      barra.style.width = '100%';
    }, 50);
  }

  function alternarTela() {
    if (!possuiTela2) {
      telaAtual = "1";
      renderizarTela();
      animarBarra();
      return;
    }
    telaAtual = telaAtual === "1" ? "2" : "1";
    renderizarTela();
    animarBarra();
  }

  function irParaTela(delta) {
    if (!possuiTela2) {
      telaAtual = "1";
      renderizarTela();
      animarBarra();
      return;
    }
    telaAtual = delta < 0 ? "1" : "2";
    renderizarTela();
    animarBarra();
  }

  function atualizarVisibilidadeNavegacao() {
    const nav = document.getElementById('nav-buttons');
    if (!nav) return;
    nav.style.display = possuiTela2 ? 'flex' : 'none';
  }

  let hideButtonsTimer;
  function mostrarBotoesTemporario() {
    if (!possuiTela2) return;
    const nav = document.getElementById('nav-buttons');
    nav.classList.add('show');
    clearTimeout(hideButtonsTimer);
    hideButtonsTimer = setTimeout(() => nav.classList.remove('show'), 1200);
  }

  async function atualizarQrRodape() {
    try {
      const res = await fetch('/api/mural/token?m=MUTIROES');
      const dados = await res.json();
      document.getElementById('qr-mural').src = `${dados.qrUrl}&v=${Date.now()}`;
    } catch (e) {
      console.error('Falha ao atualizar QR do mural de mutirões:', e);
    }
  }

  async function atualizarTudo() {
    try {
      await carregarTitulos();
      await carregarVagas();
      renderizarTela();
      animarBarra();
    } catch (e) {
      document.getElementById('lista-vagas').innerHTML = '<div class="empty">Erro de conexão com o servidor.</div>';
    }
  }

  const sse = new EventSource('/api/vagas/stream');
  sse.onmessage = () => atualizarTudo();
  sse.onerror = () => {};

  document.getElementById('btn-prev').addEventListener('click', () => irParaTela(-1));
  document.getElementById('btn-next').addEventListener('click', () => irParaTela(1));
  window.addEventListener('mousemove', mostrarBotoesTemporario);
  window.addEventListener('touchstart', mostrarBotoesTemporario, { passive: true });

  atualizarTudo();
  atualizarQrRodape();
  setInterval(atualizarQrRodape, TEMPO_ATUALIZAR_QR);
  setInterval(atualizarTudo, TEMPO_ATUALIZAR_DADOS);
  setInterval(alternarTela, TEMPO_POR_TELA);
</script>
</body>
</html>
