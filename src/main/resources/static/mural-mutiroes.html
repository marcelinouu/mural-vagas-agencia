<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mural de Mutirões</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f7a5f">
  <link rel="apple-touch-icon" href="/logo.png">
  <style>
    :root {
      --bg: #eef3f9;
      --panel: #f7faff;
      --card: #ffffff;
      --line: #d8e1ee;
      --ink: #16263a;
      --muted: #617186;
      --brand: #1f4f8a;
      --brand-deep: #163a67;
      --brand-soft: #dce8f6;
      --shadow: 0 14px 34px rgba(14, 34, 66, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(31,79,138,0.10), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 48%, #e7eef7 100%);
    }

    .app {
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 14px 30px;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -18px -14px 16px;
      padding: 18px 14px 14px;
      background: rgba(247, 251, 249, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .hero-card {
      background: linear-gradient(135deg, rgba(15,122,95,0.08), rgba(255,255,255,0.95));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brand);
      background: var(--brand-soft);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .title {
      margin: 12px 0 8px;
      font-size: 1.7rem;
      line-height: 1.05;
      font-weight: 900;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .hero-meta {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .meta-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 10px 12px;
    }

    .meta-label {
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .status {
      text-align: right;
      color: var(--brand-deep);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 7px solid var(--brand);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .card:active {
      transform: scale(0.992);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .empresa {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.1;
      font-weight: 900;
      color: #101616;
    }

    .local {
      flex: 0 0 auto;
      max-width: 42%;
      text-align: right;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--brand-deep);
    }

    .preview {
      font-size: 0.96rem;
      line-height: 1.4;
      color: #203429;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal;
    }

    .card-bottom {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .cta {
      color: var(--brand);
      font-size: 0.86rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .empty,
    .error {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 26px 20px;
      text-align: center;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .sheet {
      position: fixed;
      inset: 0;
      background: rgba(8, 16, 28, 0.46);
      display: none;
      z-index: 60;
      align-items: end;
    }

    .sheet.show { display: flex; }

    .sheet-card {
      width: 100%;
      max-height: 88vh;
      overflow: auto;
      background: linear-gradient(180deg, #ffffff 0%, #f5faf7 100%);
      border-radius: 24px 24px 0 0;
      padding: 18px 16px 24px;
      box-shadow: 0 -10px 36px rgba(0,0,0,0.18);
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .sheet-head h2 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.1;
      font-weight: 900;
    }

    .close {
      border: none;
      border-radius: 12px;
      background: #e6f1ec;
      color: #23473a;
      font-weight: 800;
      min-width: 82px;
      min-height: 38px;
    }

    .detail-grid {
      display: grid;
      gap: 12px;
    }

    .detail-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .label {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .value {
      font-size: 1rem;
      line-height: 1.45;
      color: #182a21;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="hero-card">
      <div class="eyebrow">QR exclusivo do painel de mutirões</div>
      <h1 class="title">Mural de Mutirões</h1>
      <p class="subtitle">Consulte os processos do painel de mutirões. Toque em um card para abrir a leitura completa com empresa, local e informações.</p>
      <div class="hero-meta">
        <div class="meta-chip">
          <div>
            <div class="meta-label">Acesso</div>
            <div class="status" id="status">Validando acesso...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main id="content"></main>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-card">
    <div class="sheet-head">
      <h2 id="sheetTitle"></h2>
      <button class="close" id="sheetClose">Fechar</button>
    </div>
    <div id="sheetBody"></div>
  </div>
</div>

<script>
  const MODULO = "MUTIROES";
  const contentEl = document.getElementById("content");
  const statusEl = document.getElementById("status");
  const sheetEl = document.getElementById("sheet");
  const sheetBodyEl = document.getElementById("sheetBody");
  const sheetTitleEl = document.getElementById("sheetTitle");
  let dataAtual = null;
  let expiraEm = 0;
  let sessionToken = null;

  function escaparHtml(valor) {
    return (valor || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function sanitizeRichHtml(html) {
    const root = document.createElement("div");
    root.innerHTML = html || "";

    function walk(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return escaparHtml(node.textContent || "");
      }

      if (node.nodeType !== Node.ELEMENT_NODE) {
        return "";
      }

      const tag = node.tagName.toLowerCase();
      const children = Array.from(node.childNodes).map(walk).join("");
      const fontWeight = (node.style && node.style.fontWeight ? node.style.fontWeight : "").toLowerCase();
      const isBold = tag === "b" || tag === "strong" || fontWeight === "bold" || Number(fontWeight) >= 600;

      if (tag === "br") {
        return "<br>";
      }

      if (tag === "div" || tag === "p") {
        return children ? `${children}<br>` : "";
      }

      if (isBold) {
        return `<strong>${children}</strong>`;
      }

      return children;
    }

    const sanitized = Array.from(root.childNodes).map(walk).join("");
    return sanitized.replace(/(<br>\s*)+$/i, "") || "-";
  }

  function formatarTextoPlano(html) {
    const temp = document.createElement("div");
    temp.innerHTML = html || "";
    return (temp.textContent || temp.innerText || "").trim();
  }

  function formatarDataHora(epochSeconds) {
    if (!epochSeconds) return "-";
    return new Date(epochSeconds * 1000).toLocaleString("pt-BR");
  }

  function statusSessao() {
    if (!expiraEm) return;
    const agora = Math.floor(Date.now() / 1000);
    const restante = Math.max(0, expiraEm - agora);
    const min = Math.floor(restante / 60);
    const sec = restante % 60;
    statusEl.textContent = `Ativo até ${formatarDataHora(expiraEm)} (${min}m ${sec}s)`;
  }

  function abrirDetalhes(vaga) {
    sheetTitleEl.textContent = vaga.empresa || "Mutirão";
    sheetBodyEl.innerHTML = `
      <div class="detail-grid">
        <div class="detail-card">
          <div class="label">Empresa</div>
          <div class="value">${escaparHtml(vaga.empresa || "-")}</div>
        </div>
        <div class="detail-card">
          <div class="label">Local</div>
          <div class="value">${escaparHtml(vaga.local || "-")}</div>
        </div>
        <div class="detail-card">
          <div class="label">Informações</div>
          <div class="value">${sanitizeRichHtml(vaga.atribuicoes || "-")}</div>
        </div>
      </div>
    `;
    sheetEl.classList.add("show");
  }

  function renderConteudo() {
    const vagas = (dataAtual && dataAtual.vagas) || [];
    if (!vagas.length) {
      contentEl.innerHTML = "<div class='empty'>Nenhum mutirão disponível no momento.</div>";
      return;
    }

    const html = vagas.map(v => {
      const preview = formatarTextoPlano(v.atribuicoes || "-");
      return `
        <article class="card" data-id="${v.id}">
          <div class="card-top">
            <h2 class="empresa">${escaparHtml(v.empresa || "-")}</h2>
            <div class="local">${v.local ? `📍 ${escaparHtml(v.local)}` : ""}</div>
          </div>
          <div class="preview">${escaparHtml(preview || "-")}</div>
          <div class="card-bottom">
            <span class="hint">Painel exclusivo de mutirões</span>
            <span class="cta">Abrir detalhes</span>
          </div>
        </article>
      `;
    }).join("");

    contentEl.innerHTML = `<section class="list">${html}</section>`;
    contentEl.querySelectorAll(".card").forEach(el => {
      const id = Number(el.getAttribute("data-id"));
      const vaga = vagas.find(item => item.id === id);
      el.addEventListener("click", () => abrirDetalhes(vaga || {}));
    });
  }

  async function apiFetch(url) {
    return fetch(url, { method: "GET", cache: "no-store", credentials: "same-origin" });
  }

  async function carregarDados() {
    const res = await apiFetch(`/api/mural/data?t=${encodeURIComponent(sessionToken)}&m=${MODULO}`);
    if (!res.ok) throw new Error("Acesso negado");
    dataAtual = await res.json();
    expiraEm = dataAtual.expiresAtEpochSeconds || 0;
    renderConteudo();
    statusSessao();
  }

  async function iniciarSessaoComQr(token) {
    if (!token) throw new Error("Token ausente no link");
    const res = await apiFetch(`/api/mural/session?t=${encodeURIComponent(token)}`);
    if (!res.ok) throw new Error("QR Code inválido. Escaneie novamente na TV.");
    const s = await res.json();
    sessionToken = s.token;
    expiraEm = s.expiresAtEpochSeconds || 0;
    window.history.replaceState({}, "", `${window.location.pathname}?t=${encodeURIComponent(sessionToken)}`);
  }

  async function tentarUsarSessaoAtual(token) {
    if (!token) return false;
    const res = await apiFetch(`/api/mural/validate?t=${encodeURIComponent(token)}`);
    if (!res.ok) return false;
    const v = await res.json();
    if (!v.valid) return false;
    sessionToken = token;
    expiraEm = v.expiresAtEpochSeconds || 0;
    return true;
  }

  function renderErro(msg) {
    contentEl.innerHTML = `<div class="error">${msg}</div>`;
    statusEl.textContent = "Acesso indisponível.";
  }

  document.getElementById("sheetClose").addEventListener("click", () => sheetEl.classList.remove("show"));
  sheetEl.addEventListener("click", (e) => {
    if (e.target === sheetEl) sheetEl.classList.remove("show");
  });

  (async () => {
    try {
      const tokenAtual = new URLSearchParams(window.location.search).get("t");
      const sessaoValida = await tentarUsarSessaoAtual(tokenAtual);
      if (!sessaoValida) await iniciarSessaoComQr(tokenAtual);
      await carregarDados();
      setInterval(statusSessao, 1000);
      setInterval(async () => {
        try {
          await carregarDados();
        } catch (_) {
          renderErro("Sessão expirada ou indisponível. Escaneie novamente o QR do painel de mutirões.");
        }
      }, 60000);
    } catch (e) {
      renderErro(e.message || "Não foi possível carregar o mural.");
    }
  })();
</script>
</body>
</html>
